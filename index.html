<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Ekatvam Foundation - Home</title>
    <link rel="icon" type="image/png" href="./Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS VARIABLES & THEME --- */
        :root {
            --primary-gold: #D4AF37; --primary-gold-dark: #B59020; --secondary-brown: #3E2723;
            --text-dark: #2C2C2C; --text-light: #FDFBF7; --bg-cream: #F9F7F2; --bg-white: #FFFFFF;
            --shadow-card: 0 10px 30px rgba(62, 39, 35, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; line-height: 1.7; color: var(--text-dark); background-color: var(--bg-cream); }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; color: var(--secondary-brown); }

        /* --- NAVIGATION --- */
        nav { background-color: var(--bg-white); box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: fixed; width: 100%; top: 0; z-index: 1000; padding: 0.6rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary-gold); }
        .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo img { height: 60px; }
        .logo-main { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--secondary-brown); line-height: 1; }
        .logo-sub { font-family: 'Poppins', sans-serif; font-size: 0.7rem; font-weight: 600; color: var(--primary-gold-dark); letter-spacing: 8.5px; text-transform: uppercase; display: block; }
        
        .nav-links { list-style: none; display: flex; align-items: center; gap: 1rem; }
        .dropbtn { background: transparent; color: var(--secondary-brown); padding: 0.5rem 1rem; font-size: 0.95rem; font-weight: 600; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-family: 'Poppins'; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 220px; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); z-index: 1; border-top: 3px solid var(--primary-gold); }
        .dropdown-content a { color: var(--secondary-brown); padding: 12px 16px; text-decoration: none; display: block; text-transform: uppercase; font-size: 0.85rem; border-bottom: 1px solid #eee; }
        .dropdown-content a:hover { background-color: var(--bg-cream); }
        .show { display: block; }

        .btn-login-nav { border: 1px solid var(--primary-gold); padding: 0.5rem 1rem; border-radius: 4px; color: var(--secondary-brown) !important; text-decoration: none; font-weight: 600; font-size: 0.85rem; }
        .btn-donate-nav { background: var(--secondary-brown); color: var(--primary-gold) !important; padding: 0.7rem 1.8rem; border-radius: 4px; font-weight: 600; text-decoration: none; }

        /* --- HERO --- */
        #home { height: 90vh; background: linear-gradient(rgba(30, 20, 10, 0.7), rgba(30, 20, 10, 0.6)), url('https://source.unsplash.com/1600x900/?india,heritage'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--text-light); margin-top: 80px; }
        #home h1 { font-size: 4.5rem; color: var(--primary-gold); }
        .btn-main { padding: 1rem 3rem; background-color: var(--primary-gold); color: var(--secondary-brown); text-decoration: none; font-weight: 700; text-transform: uppercase; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 10vh auto; width: 90%; max-width: 450px; border-radius: 12px; overflow: hidden; padding: 2rem; position: relative;}
        .close-modal { position: absolute; right: 20px; top: 10px; font-size: 2rem; cursor: pointer; }
        .login-form input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; }
        .login-form button { width: 100%; padding: 12px; background: var(--secondary-brown); color: var(--primary-gold); border: none; cursor: pointer; font-weight: 600; }
        
        footer { background-color: #2b1b17; color: #aaa; padding: 2rem; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <img src="./Logo.png" alt="Logo">
            <div class="logo-text-container">
                <span class="logo-main">BHARAT EKATVAM</span>
                <span class="logo-sub">FOUNDATION</span>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="javascript:void(0)" class="btn-login-nav" onclick="toggleModal()">Login</a></li>
            <li class="dropdown">
                <button onclick="toggleDropdown()" class="dropbtn">Menu ▾</button>
                <div id="myDropdown" class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="mission.html">Mission</a>
                    <a href="gallery.html">Gallery</a>
                    <a href="studies.html">Bharat Studies Center</a>
                    <a href="board.html">Board</a>
                    <a href="join.html">Join Us</a>
                </div>
            </li>
            <li><a href="donate.html" class="btn-donate-nav">Donate</a></li>
        </ul>
    </nav>

    <header id="home">
        <h1>Uniting Bharat,<br>Empowering Lives</h1>
        <p>Preserving heritage, fostering unity, and serving the nation.</p>
        <a href="donate.html" class="btn-main">Contribution</a>
    </header>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal()">&times;</span>
            <form class="login-form">
                <h3 style="margin-bottom:1rem">Login to Portal</h3>
                <div id="msg" style="display:none; color:red; margin-bottom:10px"></div>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
        </div>
    </div>

    <footer>&copy; 2025 Bharat Ekatvam Foundation.</footer>

    <script>
        function toggleDropdown() { document.getElementById("myDropdown").classList.toggle("show"); }
        function toggleModal() { 
            const m = document.getElementById("loginModal");
            m.style.display = (m.style.display === "block") ? "none" : "block";
        }
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                var d = document.getElementById("myDropdown");
                if (d.classList.contains('show')) d.classList.remove('show');
            }
        }
    </script>
</body>
</html>
